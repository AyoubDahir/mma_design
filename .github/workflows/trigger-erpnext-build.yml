# Triggers ERPNext rebuild when mma_design changes are pushed.
# Requires ARGOCD_REPO_PAT secret (PAT with repo scope) in this repo's Settings.

name: Trigger ERPNext Rebuild (mma_design)

on:
  push:
    branches: [main]
    paths:
      - '**/*.css'
      - '**/*.js'
      - '**/*.html'
      - '**/*.json'
      - '**/*.py'
      - '**/*.scss'
      - '**/*.jinja'
      - '**/*.svg'
      - '**/*.png'
      - '**/*.jpg'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger argocd build with this commit SHA
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.ARGOCD_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AyoubDahir/argocd/dispatches \
            -d '{"event_type":"mma-design-updated","client_payload":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
          echo "Triggered ERPNext rebuild (mma_design @ ${{ github.sha }})"
